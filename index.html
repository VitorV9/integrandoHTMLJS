<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTMLJS</title>
    <link rel="stylesheet" href="./main.css" />
</head>
<body>
    <form id="form-checagem">
        <div class="container">
            <h1>Formulário integrandoHTMLJS</h1>
                <h2>Insira um valor no campo B maior do que o valor do campo A</h2>
                <input id="campoA" type="number" placeholder="Campo A">
                <input id="campoB" type="number" placeholder="Campo B">
                <button type="submit">Depositar</button>
                <p class="sucess-message">
                    Sucesso, você informou um número maior no campo B do que no A.
                </p>
                <p class="error-message">
                    Erro, você deve informar um número maior no campo B do que no A.
                </p>
        </div>
    </form>
    <script src="./main.js"></script>
</body>
</html>
